<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Banco SENAC - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container" style="max-width: 450px;">
        <h2>Novo Cliente</h2>
        <form id="form-cadastro">
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha (mín. 6 caracteres)">
            <input type="number" step="0.01" id="saldo" placeholder="Saldo Inicial (R$)">
            <input type="text" id="cpf" placeholder="CPF (Apenas números ou formatado)">
            <input type="text" id="endereco" placeholder="Endereço (Ex: Rua Costa Aguiar, 35)">
            <input type="text" id="complemento" placeholder="Complemento">
            <input type="text" id="cep" placeholder="CEP (Ex: 03123-000)">
            <input type="text" id="cidade" placeholder="Cidade">
            <input type="text" id="estado" placeholder="Estado (UF)" maxlength="2">
            <input type="text" id="celular" placeholder="Celular (Ex: 11 98654-0974)">

            <button type="submit" id="btn-cadastrar">Cadastrar Cliente</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
